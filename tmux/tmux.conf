# ── Prefix ───────────────────────────────────────────────────────────────────
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ── Terminal / Colors ─────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── General ───────────────────────────────────────────────────────────────────
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0        # no delay on Esc (important for nvim)
set -g extended-keys on     # pass through extended key sequences (shift+enter, etc.)
set -g history-limit 50000
set -g focus-events on      # lets nvim autoread work
set -g allow-passthrough on # pass OSC 8 hyperlinks through to Ghostty

# ── Vi mode ───────────────────────────────────────────────────────────────────
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# ── Window / Session navigation ───────────────────────────────────────────────
bind Tab last-window        # toggle between last two windows (nvim <-> claude)
bind s display-popup -E "~/.config/tmux/scripts/tmux-session-list | fzf --prompt='session > ' --header='enter=switch  ctrl-x=kill  ctrl-o=new' --bind 'ctrl-x:execute-silent(~/.config/tmux/scripts/tmux-kill-session {})+reload(~/.config/tmux/scripts/tmux-session-list)' --bind 'ctrl-o:execute(~/.config/tmux/scripts/px)+abort' --bind 'enter:become(~/.config/tmux/scripts/tmux-switch-session {})'"
bind X confirm-before -p "Kill session #S? (y/n)" kill-session
bind y copy-mode            # enter copy/visual mode

# ── Pane resizing ─────────────────────────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# ── Pane navigation — aware of nvim splits (vim-tmux-navigator) ───────────────
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?\$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# ── Status bar ────────────────────────────────────────────────────────────────
set -g status-position top
set -g status-style 'bg=#1d2021 fg=#ebdbb2'
set -g status-left '#[fg=#fabd2f,bold] #S  '
set -g status-left-length 30
set -g status-right '#[fg=#83a598] %H:%M '
set -g window-status-format '#[fg=#928374] #I:#W '
set -g window-status-current-format '#[fg=#fb4934,bold] #I:#W '
